<app-header-fixr-cliente></app-header-fixr-cliente>
<app-sub-header-cliente></app-sub-header-cliente>

<div class="editar-container">

    <div class="top-icons">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff" 
             [routerLink]="['/notificacoes']" style="cursor: pointer">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="#fff" stroke-width="1.5" />
        </svg>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"
            style="cursor: pointer">
            <circle cx="12" cy="12" r="3" />
            <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
    </div>

    <!-- Carregando -->
    <div class="estado-loading" *ngIf="carregando">
        <div class="spinner"></div>
        <p>Carregando...</p>
    </div>

    <!-- Erro -->
    <div class="estado-erro" *ngIf="!carregando && erro">
        <span>⚠</span>
        <p>{{ erro }}</p>
    </div>

    <!-- Conteúdo -->
    <div class="editar-grid" *ngIf="!carregando && !erro && anuncio">

        <!-- Coluna esquerda: imagem -->
        <div class="coluna-imagem">
            <img [src]="getImagemUrl()" [alt]="anuncio!.descricao" class="imagem-anuncio"
                (error)="$any($event.target).src = 'assets/imagem-placeholder.png'" />
        </div>

        <!-- Coluna direita: formulário -->
        <div class="coluna-form">

            <!-- Descrição -->
            <div class="campo">
                <label class="campo-label">DESCRIÇÃO:</label>
                <textarea class="campo-textarea" [(ngModel)]="descricao" maxlength="300" rows="7"
                    placeholder="Descreva o serviço necessário...">
        </textarea>
            </div>

            <!-- Profissional e Status -->
            <div class="campos-linha">

                <div class="campo">
                    <label class="campo-label">PROFISSIONAL NECESSÁRIO:</label>
                    <select class="campo-select" [(ngModel)]="profissaoSelecionadaId">
                        <option *ngFor="let p of profissoes" [value]="p.id">{{ p.nome }}</option>
                    </select>
                </div>

                <div class="campo">
                    <label class="campo-label">STATUS:</label>
                    <select class="campo-select" [(ngModel)]="statusSelecionado">
                        <option *ngFor="let s of statusOpcoes" [value]="s">{{ getStatusLabel(s) }}</option>
                    </select>
                </div>

            </div>

        </div>

    </div>

    <!-- Botão atualizar -->
    <div class="rodape" *ngIf="!carregando && !erro && anuncio">
        <button class="btn-atualizar" (click)="atualizar()" [disabled]="salvando">
            {{ salvando ? 'Salvando...' : 'Atualizar' }}
        </button>
    </div>

</div>
