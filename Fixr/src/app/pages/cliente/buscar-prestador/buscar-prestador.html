<app-header-fixr-cliente></app-header-fixr-cliente>
<app-sub-header-cliente></app-sub-header-cliente>

<div class="page-wrapper">

  <!-- Ícones topo direito -->
  <div class="top-icons">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="#fff" stroke-width="1.5"/>
    </svg>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </div>

  <div class="filtros-row">
    <div class="profissao-label">Profissão</div>

    <div class="select-wrapper">
      <select [(ngModel)]="profissaoSelecionada" (change)="filtrar()">
        <option [ngValue]="null">Todas</option>
        <option *ngFor="let p of profissoes" [ngValue]="p.id">{{ p.nome }}</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>

    <div class="search-wrapper">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        [(ngModel)]="termoBusca"
        (input)="filtrar()"
        placeholder="Buscar por nome..."
      />
    </div>
  </div>

 
  <div class="divider"></div>

 
  <div class="lista">
    <div class="card-prestador" *ngFor="let p of prestadoresFiltrados">

      <div class="avatar">
        <img *ngIf="p.foto" [src]="p.foto" [alt]="p.nome" />
        <div *ngIf="!p.foto" class="avatar-placeholder">{{ p.nome.charAt(0) }}</div>
      </div>

      <div class="card-info">
        <div class="card-header">
          <span class="nome">{{ p.nome }}</span>
          <div class="estrelas">
            <span *ngFor="let e of getEstrelas(p.nota)" [class]="e">★</span>
          </div>
        </div>
        <div class="profissao-row">
          <span class="label-prof">Profissão:</span>
          <span class="badge-prof">{{ p.profissao.nome }}</span>
        </div>
        <div class="card-footer">
          <button class="btn-detalhes" (click)="verDetalhes(p)">DETALHES</button>
        </div>
      </div>

    </div>

    <div class="sem-resultados" *ngIf="prestadoresFiltrados.length === 0">
      Nenhum prestador encontrado.
    </div>
  </div>

</div>
