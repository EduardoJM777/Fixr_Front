<app-header-fixr-cliente></app-header-fixr-cliente>
<app-sub-header-cliente></app-sub-header-cliente>

<!-- Loading -->
<div class="page-wrapper" *ngIf="loading">
  <div class="state-overlay">
    <div class="spinner"></div>
  </div>
</div>

<!-- Erro -->
<div class="page-wrapper" *ngIf="!loading && erro">
  <div class="top-icons">
    <button title="Notificações">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    </button>
    <button title="Configurações">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    </button>
  </div>
  <div class="state-overlay">
    <div class="error-msg">{{ erro }}</div>
  </div>
</div>

<!-- Perfil carregado -->
<div class="page-wrapper" *ngIf="!loading && !erro && cliente">

  <div class="top-icons">
    <button title="Notificações" (click)="showToast('Sem novas notificações')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    </button>
    <button title="Configurações" (click)="showToast('Configurações em breve')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    </button>
  </div>

  <div class="profile-layout">

    <!-- Foto -->
    <div class="avatar-col">
      <span class="avatar-label">Imagem de perfil</span>

      <div class="avatar-frame" (click)="fotoInput.click()" title="Clique para trocar">
        <img *ngIf="fotoSrc; else semFoto" [src]="fotoSrc" alt="Foto de perfil" />
        <ng-template #semFoto>
          <div class="avatar-placeholder">
            {{ primeiroNome.charAt(0).toUpperCase() }}
          </div>
        </ng-template>
        <div class="avatar-overlay"><span>Trocar foto</span></div>
      </div>

      <input #fotoInput type="file" accept="image/*" style="display:none" (change)="onFotoSelecionada($event)" />

      <button class="btn-salvar" (click)="salvar()">Salvar</button>
    </div>

    <!-- Dados -->
    <div class="info-section">
      <div class="info-labels">
        <div class="info-row-label"><span class="info-label">Nome:</span></div>
        <div class="info-row-label"><span class="info-label">Sobrenome:</span></div>
        <div class="info-row-label"><span class="info-label">Telefone:</span></div>
        <div class="info-row-label"><span class="info-label">Email:</span></div>
      </div>
      <div class="info-values">
        <div class="info-row-value"><span class="info-value">{{ primeiroNome }}</span></div>
        <div class="info-row-value"><span class="info-value">{{ sobrenome }}</span></div>
        <div class="info-row-value"><span class="info-value">{{ cliente.telefone || '—' }}</span></div>
        <div class="info-row-value"><span class="info-value">{{ cliente.email || '—' }}</span></div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" [class.show]="toastVisible">{{ toastMsg }}</div>
