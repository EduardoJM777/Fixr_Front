<div class="header">
    <header class="preHeader">CADASTRO - PRESTADOR</header>
</div>

<div class="container">
    <form (ngSubmit)="cadastrar()">

        <div class="linha">
            <div class="campo">
                <h3>NOME COMPLETO</h3>
                <input type="text"
                       class="inNome"
                       name="nome"
                       [(ngModel)]="nome">
            </div>
        </div>

        <div class="campo">
            <h3>EMAIL</h3>
            <input type="email"
                   class="inEmail"
                   name="email"
                   [(ngModel)]="email">
        </div>

        <div class="linha">
            <div class="campo">
                <h3>SENHA</h3>
                <input type="password"
                       class="inSenha"
                       name="senha"
                       [(ngModel)]="senha">
            </div>

            <div class="campo">
                <h3>CONFIRME SUA SENHA</h3>
                <input type="password"
                       class="inConfSenha"
                       name="confSenha"
                       [(ngModel)]="confSenha">
            </div>
        </div>

        <!-- 🔥 PROFISSÃO DINÂMICA -->
        <div class="profi">
            <label>Profissão</label>

            <select name="profissaoId"
                    [(ngModel)]="profissaoId"
                    (change)="onProfissaoChange()">

                <option *ngFor="let p of profissoes" [value]="p.id">
                    {{ p.nome }}
                </option>

                <option value="outro">Outros</option>
            </select>
        </div>

        <div class="campo telefone">
            <h3>TELEFONE</h3>
            <input type="tel"
                   class="inTel"
                   name="telefone"
                   [(ngModel)]="telefone">
        </div>

        <div class="acoes">
            <button type="submit">Cadastrar</button>
        </div>

    </form>
</div>
