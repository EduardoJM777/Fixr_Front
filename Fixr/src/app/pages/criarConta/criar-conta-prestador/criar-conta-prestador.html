<form (ngSubmit)="cadastrar()">

    <div class="linha">
        <div class="campo">
            <h3>NOME COMPLETO</h3>
            <input class="inNome" type="text"
                   [(ngModel)]="nome" name="nome">
        </div>
    </div>

    <div class="campo">
        <h3>EMAIL</h3>
        <input type="email"
               [(ngModel)]="email" name="email">
    </div>

    <div class="linha">
        <div class="campo">
            <h3>SENHA</h3>
            <input type="password"
                   [(ngModel)]="senha" name="senha">
        </div>

        <div class="campo">
            <h3>CONFIRME SUA SENHA</h3>
            <input type="password"
                   [(ngModel)]="confSenha" name="confSenha">
        </div>
    </div>

    <!-- 🔥 PROFISSÃO DINÂMICA -->
    <div class="profi">
        <label>Profissão</label>

        <select [(ngModel)]="profissaoId"
                name="profissaoId"
                (change)="onProfissaoChange()">

            <option *ngFor="let p of profissoes" [value]="p.id">
                {{ p.nome }}
            </option>

            <option value="outro">Outros</option>
        </select>
    </div>

    <div class="campo telefone">
        <h3>TELEFONE</h3>
        <input type="tel"
               [(ngModel)]="telefone" name="telefone">
    </div>

    <div class="acoes">
        <button type="submit">Cadastrar</button>
    </div>

</form>
