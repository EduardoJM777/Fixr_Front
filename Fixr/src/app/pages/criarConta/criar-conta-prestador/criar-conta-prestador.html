<div class="header">
    <header class="preHeader">CADASTRO - PRESTADOR</header>
</div>

<br>

<div class="container">
    <form>
        <div class="linha">
            <div class="campo">
                <h3>NOME COMPLETO</h3>
                <input class="inNome" type="text">
            </div>

            <div class="campo data">
                <h3>DATA DE NASCIMENTO</h3>
                <div class="data-inputs">
                    <input type="text" placeholder="DD" maxlength="2">
                    <input type="text" placeholder="MM" maxlength="2">
                    <input type="text" placeholder="AAAA" maxlength="4">
                </div>
            </div>
        </div>

        <div class="campo">
            <h3>EMAIL</h3>
            <input type="email" class="inEmail">
        </div>

        <div class="linha">
            <div class="campo">
                <h3 class="">SENHA</h3>
                <input type="password" class="inSenha">
            </div>
            <div class="campo">
                <h3 class="">CONFIRME SUA SENHA</h3>
                <input type="password" class="inConfSenha">
            </div>
        </div>

            <div class="profi">
            <label for="profissao">Profissão</label>
            <select id="profissao">
                <option selected disabled>Mecânico</option>
                <option>Encanador</option>
                <option>Jardineiro</option>
                <option>Outros</option>
            </select>
            </div>

            <div class="campo telefone">
                <h3>TELEFONE</h3>
                <input type="tel" class="inTel">
            </div>

        <div class="acoes">
            <button type="submit">Cadastrar</button>
        </div>
    </form>
</div>
