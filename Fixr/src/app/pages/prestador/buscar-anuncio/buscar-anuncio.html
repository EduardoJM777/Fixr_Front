<app-headr-fixr-prestador></app-headr-fixr-prestador>
<app-sub-header-prestador></app-sub-header-prestador>

<div class="page-wrapper">

  <div class="top-icons">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </div>

  <div class="filtros-row">
    <span class="profissao-label">Profissão</span>
    <div class="select-wrapper">
      <select [(ngModel)]="profissaoSelecionada" (change)="filtrar()">
        <option value="">Todas</option>
        <option *ngFor="let p of profissoes" [value]="p">{{ p }}</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="cards-grid">
    <div class="anuncio-card" *ngFor="let a of anunciosFiltrados">
      <div class="card-img-wrapper">
        <img *ngIf="a.imagemUrl" 
             [src]="'http://localhost:8080' + a.imagemUrl" 
             alt="Foto do problema" 
             class="card-img" />
        <div *ngIf="!a.imagemUrl" class="card-img-placeholder">Sem foto</div>
      </div>
      <div class="card-body">
        <p class="card-descricao">{{ a.descricao }}</p>
        <div class="card-divider"></div>
        <p class="card-info">Anunciante: {{ a.clienteNome }}</p>
        <div class="card-divider"></div>
        <button 
          class="btn-chamar" 
          (click)="chamar(a)"
          [disabled]="chamandoAnuncioId !== null">
          {{ chamandoAnuncioId === a.id ? 'Aguardando...' : 'Chamar' }}
        </button>
      </div>
    </div>

    <div class="sem-resultados" *ngIf="anunciosFiltrados.length === 0">
      Nenhum anúncio encontrado.
    </div>
  </div>

  <div class="aviso-recusada" *ngIf="chamadaRecusada">
    Cliente não está disponível no momento.
  </div>

</div>
