<app-headr-fixr-prestador></app-headr-fixr-prestador>
<app-sub-header-prestador></app-sub-header-prestador>

<div class="page-wrapper">

  <div class="top-icons">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff" 
         [routerLink]="['/notificacoes']" style="cursor: pointer">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="#fff" stroke-width="1.5" />
    </svg>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"
      style="cursor: pointer">
      <circle cx="12" cy="12" r="3" />
      <path
        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
    </svg>
  </div>

  <div class="topo-acoes">
    <button class="btn-pular" (click)="pular()">Pular avaliação</button>
  </div>

  <div class="avaliacao-layout" *ngIf="cliente">

    <div class="coluna-esquerda">
      <div class="prestador-card">
        <span class="prestador-nome">{{ cliente.nome }}</span>
        <div class="prestador-foto-wrap">
          <img *ngIf="cliente.foto" [src]="getFotoUrl()" [alt]="cliente.nome" class="prestador-foto" />
          <div *ngIf="!cliente.foto" class="prestador-foto-placeholder">
            {{ cliente.nome.charAt(0) }}
          </div>
        </div>
      </div>
    </div>

    <div class="coluna-direita">

      <div class="nota-card">
        <p class="nota-titulo">Dê uma nota (opcional)</p>
        <div class="estrelas-row" (mouseleave)="clearHover()">
          <span *ngFor="let i of estrelas()" class="estrela" [class.ativa]="estrellaAtiva(i)" (mouseenter)="setHover(i)"
            (click)="setNota(i)">
            ★
          </span>
        </div>
      </div>

      <div class="comentarios-row">
        <div class="campo-wrap">
          <label class="campo-label">Insira um comentário (opcional):</label>
          <textarea class="campo-textarea" [(ngModel)]="comentario" maxlength="100"
            placeholder="Conte como foi a experiência...">
          </textarea>
        </div>
        <div class="campo-wrap">
          <label class="campo-label">O que pode melhorar (opcional):</label>
          <textarea class="campo-textarea" [(ngModel)]="sugestaoMelhoria" maxlength="100"
            placeholder="Sugestões de melhoria...">
          </textarea>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-continuar" (click)="enviar()" [disabled]="enviando">
          {{ enviando ? 'Enviando...' : 'Continuar' }}
        </button>
      </div>

    </div>

  </div>

</div>
