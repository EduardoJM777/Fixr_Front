<app-headr-fixr-prestador></app-headr-fixr-prestador>
<app-sub-header-prestador></app-sub-header-prestador>

<div class="page-wrapper" *ngIf="loading">
  <div class="state-overlay">
    <div class="spinner"></div>
  </div>
</div>

<div class="page-wrapper" *ngIf="!loading && erro">
  <div class="state-overlay">
    <div class="error-msg">{{ erro }}</div>
  </div>
</div>

<div class="page-wrapper" *ngIf="!loading && !erro && prestador">

  <div class="profile-layout">

    <div class="profile-top">
    <div class="avatar-col">
      <span class="avatar-label">Imagem de perfil</span>

      <div class="avatar-frame" (click)="fotoInput.click()" title="Clique para trocar">
        <img *ngIf="fotoSrc; else semFoto" [src]="fotoSrc" alt="Foto de perfil" />
        <ng-template #semFoto>
          <div class="avatar-placeholder">
            {{ editNome.charAt(0).toUpperCase() }}
          </div>
        </ng-template>
        <div class="avatar-overlay"><span>Trocar foto</span></div>
      </div>

      <input #fotoInput type="file" accept="image/*" style="display:none" (change)="onFotoSelecionada($event)" />

      <button class="btn-salvar" (click)="salvar()" [disabled]="salvando">
        {{ salvando ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>

    <div class="info-section">
      <div class="info-labels">
        <div class="info-row-label"><span class="info-label">Nome:</span></div>
        <div class="info-row-label"><span class="info-label">Sobrenome:</span></div>
        <div class="info-row-label"><span class="info-label">Telefone:</span></div>
        <div class="info-row-label"><span class="info-label">Email:</span></div>
      </div>
      <div class="info-values">
        <div class="info-row-value">
          <input class="info-input" [(ngModel)]="editNome" placeholder="Nome" />
        </div>
        <div class="info-row-value">
          <input class="info-input" [(ngModel)]="editSobrenome" placeholder="Sobrenome" />
        </div>
        <div class="info-row-value">
          <input class="info-input" [(ngModel)]="editTelefone" placeholder="Telefone" />
        </div>
        <div class="info-row-value">
          <input class="info-input" [(ngModel)]="editEmail" placeholder="Email" type="email" />
        </div>
      </div>
    </div>
    </div>

    <div class="profissao-section">
      <p class="section-title">Profissão atual: <strong>{{ prestador?.profissao?.nome }}</strong></p>
      <div class="profissao-row">
        <select [(ngModel)]="profissaoSelecionada" class="select-profissao">
          <option [ngValue]="null" disabled>Selecionar nova profissão</option>
          <option *ngFor="let p of profissoes" [ngValue]="p.id">{{ p.nome }}</option>
        </select>
        <button class="btn-trocar" (click)="trocarProfissao()"
                [disabled]="!profissaoSelecionada">
          Trocar
        </button>
      </div>
    </div>

    
    <div class="danger-section">
      <button class="btn-excluir" (click)="confirmarExclusao()">
        Excluir conta
      </button>
    </div>

  </div>

  
  <div class="modal-overlay" *ngIf="mostrarConfirmacaoExclusao">
    <div class="modal">
      <p>Tem certeza que deseja excluir sua conta?</p>
      <p class="modal-aviso">Esta ação não pode ser desfeita.</p>
      <div class="modal-btns">
        <button class="btn-confirmar-excluir" (click)="excluirConta()">Sim, excluir</button>
        <button class="btn-cancelar-modal" (click)="cancelarExclusao()">Cancelar</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" [class.show]="toastVisible">{{ toastMsg }}</div>
